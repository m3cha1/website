<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: 'Arial', sans-serif;
  background: url('https://raw.githubusercontent.com/m3cha1/website/main/background.png') center center / cover no-repeat fixed;
  color: #fff;
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
.container {
  text-align: center;
  z-index: 10;
  position: relative;
}
h1 {
  font-size: 3em;
  margin: 0;
  font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(135deg, #c084fc, #a855f7);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glow 2s ease-in-out infinite;
}
@keyframes glow {
  0%, 100% {
    text-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
    filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.6));
  }
  50% {
    text-shadow: 0 0 30px rgba(168, 85, 247, 0.8);
    filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.9));
  }
}
.subtitle {
  font-size: 1.2em;
  margin-top: 10px;
  color: #fff;
  text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
}
.subtitle a {
  color: #ffd700;
  text-decoration: none;
  font-size: 1em;
  transition: color 0.3s ease, text-shadow 0.3s ease;
}
.subtitle a:hover {
  color: #ffed4e;
  text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
}
.logo {
  width: 200px;
  height: 200px;
  object-fit: cover;
  margin-bottom: 20px;
}
</style>
</head>
<body>
<div class="container">
  <img class="logo" src="https://raw.githubusercontent.com/m3cha1/website/main/logo-with-outline.png" alt="logo">
  <h1>Welcome to my website</h1>
  <p class="subtitle">Hi I code random stuff in <a href="https://python.org" target="_blank">python</a></p>
  <div class="links">

    <a href="https://github.com/m3cha1" target="_blank">Github</a>
    <a href="https://youtube.com/@m3cha1" target="_blank">YouTube</a>
    <a href="https://www.roblox.com/users/7843710526/profile" target="_blank">Roblox</a>
  </div>
</div>
</body>
</html>
